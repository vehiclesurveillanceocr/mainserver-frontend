services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    image: surveillance-main-server-frontend:local
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
