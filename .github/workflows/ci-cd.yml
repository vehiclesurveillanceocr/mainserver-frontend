name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: surveillance-main-server-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build And Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        run: |
          ssh "${EC2_USER}@${EC2_HOST}" \
            "set -euo pipefail && \
            if [ -d '${EC2_APP_DIR}/.git' ]; then \
              cd '${EC2_APP_DIR}'; \
            else \
              mkdir -p '${EC2_APP_DIR}'; \
              if [ \"\$(ls -A '${EC2_APP_DIR}' 2>/dev/null)\" ]; then \
                echo 'EC2_APP_DIR exists but is not a git repository: ${EC2_APP_DIR}'; \
                exit 1; \
              fi; \
              git clone --branch main '${REPO_URL}' '${EC2_APP_DIR}'; \
              cd '${EC2_APP_DIR}'; \
            fi && \
            git fetch origin main && \
            git checkout main && \
            git pull --ff-only origin main && \
            chmod +x deploy_nohup.sh && \
            ./deploy_nohup.sh"
