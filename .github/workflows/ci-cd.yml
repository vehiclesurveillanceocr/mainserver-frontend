name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: surveillance-main-server-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          tar \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="node_modules" \
            --exclude=".next" \
            --exclude="logs" \
            -czf - . | ssh -o IdentitiesOnly=yes "${EC2_USER}@${EC2_HOST}" "
              set -euo pipefail

              mkdir -p '${EC2_APP_DIR}'
              tmp_dir=\$(mktemp -d)

              tar -xzf - -C \"\$tmp_dir\"

              # SAFE CLEAN (won’t touch .ssh or system files)
              find '${EC2_APP_DIR}' -mindepth 1 -maxdepth 1 \
                ! -name 'logs' \
                ! -name '.next-start.pid' \
                -exec rm -rf {} +

              cp -a \"\$tmp_dir\"/. '${EC2_APP_DIR}'/

              cd '${EC2_APP_DIR}'
              chmod +x deploy_nohup.sh
              ./deploy_nohup.sh
            "
